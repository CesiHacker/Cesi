<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTRA SMM • ENTERPRISE v5.0</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    :root {
      --bg: #0b0f1a;
      --bg2: #141b2b;
      --glass: rgba(18, 28, 46, 0.8);
      --glass-hover: rgba(30, 45, 70, 0.9);
      --border: rgba(0, 255, 255, 0.15);
      --neon: #00f0ff;
      --neon2: #b983ff;
      --neon3: #4effb5;
      --neon4: #ff77a9;
      --gold: #ffd966;
      --text: #f0f9ff;
      --dim: #7f8c9f;
      --danger: #ff5577;
      --success: #2ecc71;
      --warn: #f39c12;
      --card-r: 20px;
      --sidebar-w: 280px;
      --transition: all 0.25s ease;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.08) 0%, transparent 30%),
        radial-gradient(circle at 90% 70%, rgba(185, 131, 255, 0.08) 0%, transparent 30%);
    }

    /* glassmorphism */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--card-r);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }

    #app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
    }

    /* sidebar */
    aside {
      background: rgba(8, 12, 23, 0.95);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border);
      padding: 1.8rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      overflow-y: auto;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--neon), var(--neon2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      padding-left: 0.5rem;
    }

    .logo-sub {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 2px;
      padding-left: 0.8rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    nav li {
      padding: 12px 16px;
      border-radius: 14px;
      cursor: pointer;
      color: var(--dim);
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
      user-select: none;
    }

    nav li:hover {
      background: rgba(0, 240, 255, 0.1);
      color: var(--text);
      transform: translateX(5px);
    }

    nav li.active {
      background: linear-gradient(90deg, rgba(0, 240, 255, 0.2), transparent);
      color: var(--neon);
      border-left: 4px solid var(--neon);
    }

    nav .ns {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--dim);
      padding: 8px 16px 4px;
      letter-spacing: 2px;
    }

    main {
      padding: 2rem 2.2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* page header */
    .ph {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .pt {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--neon), var(--neon2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* stat cards */
    .sg {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .sc {
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      border-left: 4px solid var(--neon);
    }

    .sc:hover {
      transform: translateY(-5px);
      border-color: var(--neon2);
      box-shadow: 0 20px 30px rgba(0, 240, 255, 0.2);
    }

    .sl {
      font-size: 0.8rem;
      color: var(--dim);
      letter-spacing: 1px;
    }

    .sv {
      font-size: 2.5rem;
      font-weight: 800;
      margin-top: 0.2rem;
    }

    .si {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 2rem;
      opacity: 0.3;
    }

    /* tables */
    .tbl {
      overflow-x: auto;
      border-radius: var(--card-r);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      padding: 1rem 1rem;
      color: var(--dim);
      font-weight: 600;
      text-align: left;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    tr:hover td {
      background: rgba(0, 240, 255, 0.03);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .bg { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
    .bb { background: rgba(0, 240, 255, 0.2); color: #00f0ff; }
    .br { background: rgba(255, 85, 119, 0.2); color: #ff5577; }
    .bw { background: rgba(243, 156, 18, 0.2); color: #f39c12; }
    .bp { background: rgba(185, 131, 255, 0.2); color: #b983ff; }

    /* buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn:hover {
      background: rgba(0, 240, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 240, 255, 0.3);
    }

    .bp2 {
      background: linear-gradient(135deg, var(--neon), var(--neon2));
      color: #000;
      border: none;
    }

    /* forms */
    input, select, textarea {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 12px 16px;
      outline: none;
      width: 100%;
    }

    input:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.2);
    }

    label {
      font-size: 0.8rem;
      color: var(--dim);
      margin-bottom: 5px;
      display: block;
    }

    /* auth modal */
    #auth {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 30% 30%, rgba(0,240,255,0.1) 0%, transparent 50%);
    }

    .ac {
      width: 460px;
      padding: 2.5rem;
    }

    .auth-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 40px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      font-weight: 700;
    }

    .auth-tab.active {
      background: linear-gradient(135deg, var(--neon), var(--neon2));
      color: #000;
    }

    /* toast */
    #tz {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      padding: 14px 24px;
      border-radius: 40px;
      font-weight: 500;
      backdrop-filter: blur(20px);
      animation: slideIn 0.3s;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .ts { background: rgba(46, 204, 113, 0.9); }
    .te { background: rgba(255, 85, 119, 0.9); }
    .tw { background: rgba(243, 156, 18, 0.9); }

    /* modal */
    .mo {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
    }

    .md {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
    }

    /* progress bars */
    .pb { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .pf { height: 100%; background: linear-gradient(to right, var(--neon), var(--neon2)); }

    /* online/offline */
    .on { width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
    .off { width: 10px; height: 10px; background: var(--dim); border-radius: 50%; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } }

    /* responsive */
    @media (max-width: 800px) {
      #app { grid-template-columns: 1fr; }
      aside { display: none; }
    }

    .hidden { display: none !important; }
    .fl { display: flex; align-items: center; }
    .g1 { gap: 1rem; }
    .mt2 { margin-top: 1rem; }
    .mb1 { margin-bottom: 0.5rem; }
    .text-neon { color: var(--neon); }
  </style>
</head>
<body>
  <!-- toast container -->
  <div id="tz"></div>

  <!-- AUTH SCREEN (Login / Register) -->
  <div id="auth">
    <div class="ac glass">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 2.5rem; background: linear-gradient(135deg, var(--neon), var(--neon2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🚀 ULTRA SMM</h1>
        <p style="color: var(--dim);">enterprise control • v5.0</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tabLogin" onclick="Auth.switchTab('login')">🔐 LOGIN</div>
        <div class="auth-tab" id="tabRegister" onclick="Auth.switchTab('register')">📝 REGISTER</div>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <div class="fg mb1">
          <label>👤 USERNAME</label>
          <input type="text" id="loginUsername" placeholder="cesi" autocomplete="off">
        </div>
        <div class="fg mb1">
          <label>🔑 PASSWORD</label>
          <input type="password" id="loginPassword" placeholder="•••••••" onkeydown="if(event.key==='Enter') Auth.login()">
        </div>
        <button class="btn bp2" style="width: 100%; padding: 14px;" onclick="Auth.login()">⚡ LOGIN</button>
        <p id="loginError" style="color: var(--danger); font-size: 0.8rem; text-align: center; margin-top: 1rem;"></p>
      </div>

      <!-- REGISTER FORM (hidden by default) -->
      <div id="registerForm" style="display: none;">
        <div class="fg mb1">
          <label>🌟 USERNAME</label>
          <input type="text" id="regUser" placeholder="cooluser" autocomplete="off">
        </div>
        <div class="fg mb1">
          <label>📧 EMAIL</label>
          <input type="email" id="regEmail" placeholder="user@smm.com">
        </div>
        <div class="fg mb1">
          <label>🔒 PASSWORD</label>
          <input type="password" id="regPass" placeholder="min 6 chars">
        </div>
        <div class="fg mb1">
          <label>🔁 CONFIRM PASSWORD</label>
          <input type="password" id="regPass2">
        </div>
        <button class="btn bp2" style="width: 100%; padding: 14px;" onclick="Auth.register()">✨ CREATE ACCOUNT</button>
        <p id="regError" style="color: var(--danger); font-size: 0.8rem; text-align: center; margin-top: 1rem;"></p>
      </div>
    </div>
  </div>

  <!-- MAIN APP (hidden until auth) -->
  <div id="app" class="hidden">
    <aside class="glass">
      <div>
        <div class="logo">⚡ ULTRA SMM</div>
        <div class="logo-sub">god mode v5.0</div>
      </div>
      <nav>
        <ul id="sidebarMenu">
          <!-- dynamically filled by JS based on role -->
        </ul>
      </nav>
      <div style="margin-top: auto; padding: 1rem 0.5rem; border-top: 1px solid var(--border);">
        <div id="sidebarUserInfo" class="fl g1">
          <span class="on"></span> <span id="sidebarUsername"></span>
        </div>
      </div>
    </aside>

    <main id="mainContent"></main>
  </div>

  <!-- MODAL PLACEHOLDER -->
  <div id="modalHost"></div>

  <script>
    // ==================== STORAGE MANAGER ====================
    const DB = {
      prefix: 'smm5_',
      get(key, def = []) {
        try {
          const val = localStorage.getItem(this.prefix + key);
          return val ? JSON.parse(val) : def;
        } catch { return def; }
      },
      set(key, val) {
        localStorage.setItem(this.prefix + key, JSON.stringify(val));
      },
      uid() { return Math.floor(100000 + Math.random() * 900000); },
      hash(str) {
        let h = 5381;
        for (let i = 0; i < str.length; i++) h = (h << 5) + h + str.charCodeAt(i);
        return (h >>> 0).toString(36);
      },
      init() {
        if (!this.get('users').length) {
          // default admin
          this.set('users', [
            { id: 1, username: 'cesi', email: 'admin@smm.pro', password: this.hash('cesi123'), role: 'admin', balance: 50000, status: 'active', joined: new Date().toISOString().slice(0,10), cashback: 5, creditLimit: 999999, orders: [], refCode: 'ADMIN1' }
          ]);
        }
        if (!this.get('services').length) this.generateServices();
        if (!this.get('orders').length) this.set('orders', []);
        if (!this.get('logs').length) this.set('logs', []);
        if (!this.get('bans').length) this.set('bans', []);
        if (!this.get('promos').length) this.set('promos', []);
        if (!this.get('txs').length) this.set('txs', []);
      },
      generateServices() {
        const cats = ['Instagram','TikTok','YouTube','Twitter','Facebook','Telegram','Snapchat'];
        const types = ['Followers','Likes','Views','Comments','Shares'];
        const services = [];
        for (let i = 1; i <= 500; i++) {
          const cat = cats[i % cats.length];
          const type = types[i % types.length];
          services.push({
            id: i,
            cat,
            name: `${cat} ${type} — ${['real', 'premium', 'turbo', 'drip-feed'][i % 4]}`,
            price: +(Math.random() * 5 + 0.1).toFixed(4),
            min: [10,50,100][i%3],
            max: [5000,10000,20000][i%3],
            active: true
          });
        }
        this.set('services', services);
      }
    };

    // ==================== LOGGER ====================
    const Log = {
      add(type, action, desc) {
        const logs = DB.get('logs');
        logs.unshift({ id: DB.uid(), type, action, desc, time: new Date().toLocaleString() });
        if (logs.length > 1000) logs.pop();
        DB.set('logs', logs);
      }
    };

    // ==================== TOAST ====================
    const Toast = {
      show(msg, type = 'success') {
        const tz = document.getElementById('tz');
        const toast = document.createElement('div');
        toast.className = `toast ${type === 'success' ? 'ts' : type === 'danger' ? 'te' : 'tw'}`;
        toast.innerText = msg;
        tz.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
      }
    };

    // ==================== AUTH ====================
    const Auth = {
      sess: null,
      attempts: 0,
      locked: false,
      switchTab(tab) {
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      },
      login() {
        if (this.locked) { Toast.show('Too many attempts, wait 60s', 'danger'); return; }
        const username = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPassword').value;
        const users = DB.get('users');
        const user = users.find(u => u.username === username && u.password === DB.hash(pass));
        if (user) {
          if (user.status !== 'active') { Toast.show('Account banned', 'danger'); return; }
          this.sess = { id: user.id, username: user.username, role: user.role };
          document.getElementById('auth').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          document.getElementById('sidebarUsername').innerText = user.username;
          Log.add('login', 'LOGIN', `User ${user.username} logged in`);
          Toast.show(`Welcome ${user.username} 🎉`, 'success');
          App.nav('dashboard');
          this.attempts = 0;
        } else {
          this.attempts++;
          document.getElementById('loginError').innerText = `Invalid credentials (${this.attempts}/5)`;
          if (this.attempts >= 5) {
            this.locked = true;
            setTimeout(() => { this.locked = false; this.attempts = 0; }, 60000);
          }
        }
      },
      register() {
        const username = document.getElementById('regUser').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value;
        const pass2 = document.getElementById('regPass2').value;
        if (!username || !email || !pass) { document.getElementById('regError').innerText = 'All fields required'; return; }
        if (pass !== pass2) { document.getElementById('regError').innerText = 'Passwords mismatch'; return; }
        if (pass.length < 6) { document.getElementById('regError').innerText = 'Password too short'; return; }
        const users = DB.get('users');
        if (users.find(u => u.username === username)) { document.getElementById('regError').innerText = 'Username exists'; return; }
        const newUser = {
          id: DB.uid(),
          username,
          email,
          password: DB.hash(pass),
          role: 'user',
          balance: 10, // welcome bonus
          status: 'active',
          joined: new Date().toISOString().slice(0,10),
          cashback: 3,
          creditLimit: 500,
          orders: [],
          refCode: username.toUpperCase().slice(0,4) + DB.uid().toString().slice(0,4)
        };
        users.push(newUser);
        DB.set('users', users);
        Log.add('user', 'REGISTER', `New user ${username} registered`);
        Toast.show('Registration successful! Please login.', 'success');
        this.switchTab('login');
        document.getElementById('loginUsername').value = username;
        document.getElementById('loginPassword').value = '';
      },
      logout() {
        Log.add('login', 'LOGOUT', `User ${this.sess?.username} logged out`);
        this.sess = null;
        location.reload();
      }
    };

    // ==================== MAIN APP CONTROLLER ====================
    const App = {
      currentUser: null,
      nav(view) {
        if (!Auth.sess) return;
        const users = DB.get('users');
        this.currentUser = users.find(u => u.id === Auth.sess.id);
        this.renderSidebar();
        const fn = this.views[view];
        if (fn) fn.call(this);
        else document.getElementById('mainContent').innerHTML = '<div class="glass p15">404</div>';
      },
      renderSidebar() {
        const isAdmin = this.currentUser?.role === 'admin';
        const menu = document.getElementById('sidebarMenu');
        let items = '';
        if (isAdmin) {
          items = `
            <li class="ns">MAIN</li>
            <li onclick="App.nav('dashboard')" data-view="dashboard">📊 Dashboard</li>
            <li onclick="App.nav('orders')" data-view="orders">📦 Orders</li>
            <li onclick="App.nav('services')" data-view="services">🛠 Services</li>
            <li class="ns">MANAGEMENT</li>
            <li onclick="App.nav('users')" data-view="users">👥 Users</li>
            <li onclick="App.nav('balance')" data-view="balance">💰 Balance</li>
            <li onclick="App.nav('promo')" data-view="promo">🎟 Promo</li>
            <li class="ns">SYSTEM</li>
            <li onclick="App.nav('logs')" data-view="logs">📑 Logs</li>
            <li onclick="App.nav('settings')" data-view="settings">⚙ Settings</li>
          `;
        } else {
          items = `
            <li class="ns">USER</li>
            <li onclick="App.nav('dashboard')" data-view="dashboard">🏠 Dashboard</li>
            <li onclick="App.nav('orders')" data-view="orders">📦 My Orders</li>
            <li onclick="App.nav('services')" data-view="services">🛠 Services</li>
            <li onclick="App.nav('balance')" data-view="balance">💰 My Wallet</li>
            <li onclick="App.nav('profile')" data-view="profile">👤 Profile</li>
          `;
        }
        items += `<li onclick="Auth.logout()" style="color: var(--danger); margin-top: 2rem;">🚪 Logout</li>`;
        menu.innerHTML = items;
        // highlight active
        menu.querySelectorAll('li[data-view]').forEach(li => li.classList.remove('active'));
        const active = menu.querySelector(`li[data-view="${sessionStorage.getItem('lastView') || 'dashboard'}"]`);
        if (active) active.classList.add('active');
      },
      views: {
        dashboard() {
          const isAdmin = this.currentUser.role === 'admin';
          let html = '<div class="ph"><div class="pt">✨ Dashboard</div></div><div class="sg">';
          if (isAdmin) {
            const users = DB.get('users');
            const orders = DB.get('orders');
            html += `
              <div class="sc glass"><div class="si">👥</div><div class="sl">Users</div><div class="sv">${users.length}</div></div>
              <div class="sc glass"><div class="si">📦</div><div class="sl">Orders</div><div class="sv">${orders.length}</div></div>
              <div class="sc glass"><div class="si">💰</div><div class="sl">Revenue</div><div class="sv">$${orders.reduce((a,o)=>a+ (o.cost||0),0).toFixed(2)}</div></div>
            `;
          } else {
            const myOrders = DB.get('orders').filter(o => o.uid === this.currentUser.id);
            html += `
              <div class="sc glass"><div class="si">💰</div><div class="sl">Balance</div><div class="sv">$${this.currentUser.balance.toFixed(2)}</div></div>
              <div class="sc glass"><div class="si">📦</div><div class="sl">My Orders</div><div class="sv">${myOrders.length}</div></div>
              <div class="sc glass"><div class="si">⭐</div><div class="sl">Cashback</div><div class="sv">${this.currentUser.cashback}%</div></div>
            `;
          }
          html += '</div><div class="glass p15 mt2">🚀 Welcome back, ' + this.currentUser.username + '</div>';
          document.getElementById('mainContent').innerHTML = html;
          sessionStorage.setItem('lastView', 'dashboard');
        },
        orders() {
          const isAdmin = this.currentUser.role === 'admin';
          const orders = isAdmin ? DB.get('orders') : DB.get('orders').filter(o => o.uid === this.currentUser.id);
          let html = '<div class="ph"><div class="pt">📦 Orders</div>';
          if (isAdmin) html += '<button class="btn bp2" onclick="App.showNewOrderModal()">+ New Order</button>';
          html += '</div><div class="glass"><div class="tbl"><table><thead><tr><th>ID</th><th>Service</th><th>Qty</th><th>Cost</th><th>Status</th></tr></thead><tbody>';
          orders.forEach(o => {
            html += `<tr><td>#${o.id}</td><td>${o.sname || '—'}</td><td>${o.qty}</td><td>$${o.cost}</td><td><span class="badge ${o.status==='Completed'?'bg':'bw'}">${o.status}</span></td></tr>`;
          });
          html += '</tbody></table></div></div>';
          document.getElementById('mainContent').innerHTML = html;
          sessionStorage.setItem('lastView', 'orders');
        },
        services() {
          const services = DB.get('services').slice(0, 50);
          let html = '<div class="ph"><div class="pt">🛠 Services</div></div><div class="glass"><div class="tbl"><table><thead><tr><th>ID</th><th>Category</th><th>Name</th><th>Price/1k</th><th>Min</th><th>Max</th></tr></thead><tbody>';
          services.forEach(s => {
            html += `<tr><td>${s.id}</td><td>${s.cat}</td><td>${s.name}</td><td>$${s.price}</td><td>${s.min}</td><td>${s.max}</td></tr>`;
          });
          html += '</tbody></table></div></div>';
          document.getElementById('mainContent').innerHTML = html;
          sessionStorage.setItem('lastView', 'services');
        },
        balance() {
          const txs = DB.get('txs').filter(t => t.uid === this.currentUser.id);
          let html = `<div class="ph"><div class="pt">💰 Balance</div></div>
            <div class="sc glass"><div class="sl">Your Balance</div><div class="sv">$${this.currentUser.balance.toFixed(2)}</div></div>
            <div class="glass mt2"><div class="tbl"><table><thead><tr><th>Date</th><th>Description</th><th>Amount</th></tr></thead><tbody>`;
          txs.slice(0,20).forEach(t => {
            html += `<tr><td>${new Date(t.ts).toLocaleString()}</td><td>${t.desc}</td><td class="${t.amount>0?'text-neon':'tdg'}">${t.amount>0?'+':''}${t.amount}</td></tr>`;
          });
          html += '</tbody></table></div></div>';
          document.getElementById('mainContent').innerHTML = html;
          sessionStorage.setItem('lastView', 'balance');
        },
        profile() {
          const u = this.currentUser;
          const html = `
            <div class="ph"><div class="pt">👤 Profile</div></div>
            <div class="glass p15">
              <p><strong>Username:</strong> ${u.username}</p>
              <p><strong>Email:</strong> ${u.email}</p>
              <p><strong>Role:</strong> ${u.role}</p>
              <p><strong>Balance:</strong> $${u.balance}</p>
              <p><strong>Cashback:</strong> ${u.cashback}%</p>
              <p><strong>Referral code:</strong> ${u.refCode}</p>
              <button class="btn bgh mt2" onclick="Auth.logout()">🚪 Logout</button>
            </div>
          `;
          document.getElementById('mainContent').innerHTML = html;
          sessionStorage.setItem('lastView', 'profile');
        },
        users() { if (this.currentUser.role !== 'admin') return; /* admin only */ },
        promo() { /* admin promo */ },
        logs() { /* admin logs */ },
        settings() { /* admin settings */ }
      },
      showNewOrderModal() {
        const services = DB.get('services').slice(0,20);
        let options = '<option value="">Select</option>';
        services.forEach(s => options += `<option value="${s.id}">${s.name} ($${s.price}/1k)</option>`);
        const modal = document.getElementById('modalHost');
        modal.innerHTML = `
          <div class="mo" onclick="if(event.target.classList.contains('mo')) App.closeModal()">
            <div class="md">
              <h3>➕ New Order</h3>
              <div class="fg mt2">
                <label>Service</label>
                <select id="modalService">${options}</select>
              </div>
              <div class="fg mt2">
                <label>Quantity</label>
                <input type="number" id="modalQty" min="1">
              </div>
              <div class="fg mt2">
                <label>Link</label>
                <input id="modalLink" placeholder="https://">
              </div>
              <div class="fl g1 mt2">
                <button class="btn bp2" onclick="App.placeOrder()">Place Order</button>
                <button class="btn bgh" onclick="App.closeModal()">Cancel</button>
              </div>
            </div>
          </div>
        `;
      },
      placeOrder() {
        const sid = document.getElementById('modalService').value;
        const qty = +document.getElementById('modalQty').value;
        const link = document.getElementById('modalLink').value;
        if (!sid || !qty || !link) { Toast.show('Fill all fields', 'warn'); return; }
        const services = DB.get('services');
        const s = services.find(x => x.id == sid);
        if (!s) return;
        const cost = +(qty / 1000 * s.price).toFixed(4);
        const users = DB.get('users');
        const user = users.find(u => u.id === Auth.sess.id);
        if (user.balance < cost) { Toast.show('Insufficient balance', 'danger'); App.closeModal(); return; }
        user.balance -= cost;
        const order = {
          id: DB.uid(),
          sid: s.id,
          sname: s.name,
          qty,
          link,
          cost,
          status: 'Pending',
          uid: user.id,
          at: new Date().toISOString()
        };
        const orders = DB.get('orders');
        orders.unshift(order);
        DB.set('orders', orders);
        DB.set('users', users);
        const txs = DB.get('txs');
        txs.unshift({ id: DB.uid(), uid: user.id, amount: -cost, desc: `Order #${order.id}`, ts: Date.now() });
        DB.set('txs', txs);
        Log.add('order', 'PLACE', `Order ${order.id} placed by ${user.username}`);
        Toast.show(`Order placed! $${cost} deducted`, 'success');
        App.closeModal();
        App.nav('orders');
      },
      closeModal() { document.getElementById('modalHost').innerHTML = ''; }
    };

    // ==================== INIT ====================
    window.onload = () => {
      DB.init();
      // auto logout after inactivity (simulate)
      let idle = 0;
      setInterval(() => {
        idle++;
        if (idle > 1800 && Auth.sess) { Auth.logout(); } // 30 min
      }, 1000);
      document.addEventListener('mousemove', () => idle = 0);
      document.addEventListener('keydown', () => idle = 0);
    };
  </script>
</body>
</html>
